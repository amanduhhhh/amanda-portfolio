# Only POST requests get rate-limited
map $request_method $limit_post_key {
    POST    $binary_remote_addr;
    default "";
}

# 1 request per minute per IP 
limit_req_zone $limit_post_key zone=timeline_post:10m rate=1r/m;

server {
    listen 80;
    server_name amandaxi.duckdns.org;

    if ($host = amandaxi.duckdns.org) {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name amandaxi.duckdns.org;

    # Rate limit 
    location = /api/timeline_post {
        limit_req zone=timeline_post;
        limit_req_status 429;
        proxy_pass http://myportfolio:5000;
    }

    location / {
        proxy_pass http://myportfolio:5000/;
    }

    # Load the certificate files.
    ssl_certificate /etc/letsencrypt/live/myportfolio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myportfolio/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/myportfolio/chain.pem;
}
